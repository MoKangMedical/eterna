version: '3.8'
services:
  eterna:
    build: .
    ports:
      - '8102:8102'
    volumes:
      - ./memorial_data:/app/memorial_data
      - ./frontend/assets:/app/frontend/assets
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8102/health']
      interval: 30s
      timeout: 10s
      retries: 3
